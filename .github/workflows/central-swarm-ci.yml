name: Central SWARM CI — Fleet Controller

on:
  push:
    branches:
      - "**"
  pull_request:
  repository_dispatch:
    types: [swarm-ci-trigger]
  schedule:
    # Hourly fleet audit
    - cron: "0 * * * *"

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Governance Gate — protect critical artifacts
  # ──────────────────────────────────────────────
  governance-check:
    name: Governance Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect protected-file mutations
        run: |
          PROTECTED_PATTERNS=(
            "prompts/"
            "governance/"
            "specs/"
          )

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          fi

          VIOLATIONS=""
          for PATTERN in "${PROTECTED_PATTERNS[@]}"; do
            HITS=$(echo "$CHANGED" | grep "^${PATTERN}" || true)
            if [ -n "$HITS" ]; then
              VIOLATIONS+="  • $HITS\n"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Governance violation — protected files modified:"
            printf "$VIOLATIONS"
            exit 1
          fi
          echo "✅ Governance check passed — no protected files modified."

  # ──────────────────────────────────────────────
  # 2. Lint — ESLint flat config (v9+)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: governance-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # 3. Build — TypeScript + Vite
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. Dependency audit
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: governance-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        # Warn on high/critical vulnerabilities but don't block the fleet
        run: npm audit --audit-level=critical || true

      - name: Check for outdated packages
        run: npm outdated || true

  # ──────────────────────────────────────────────
  # 5. Green-Light Gate — all jobs must pass
  # ──────────────────────────────────────────────
  green-light:
    name: Green-Light Gate
    runs-on: ubuntu-latest
    needs: [governance-check, lint, build, dependency-audit]
    if: always()
    steps:
      - name: Evaluate fleet status
        run: |
          RESULTS="${{ needs.governance-check.result }} ${{ needs.lint.result }} ${{ needs.build.result }} ${{ needs.dependency-audit.result }}"
          echo "Job results: $RESULTS"
          for RESULT in $RESULTS; do
            if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
              echo "::error::Fleet gate FAILED — one or more required jobs did not pass."
              exit 1
            fi
          done
          echo "✅ All fleet checks passed — repository is GREEN."
