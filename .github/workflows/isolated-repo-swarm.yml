name: Isolated Repo SWARM CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # 2. Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

  # ──────────────────────────────────────────────
  # 3. Dependency conflict detector
  # ──────────────────────────────────────────────
  dependency-check:
    name: Dependency Conflict Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect dependency conflicts
        id: dep-check
        run: |
          # Capture any peer-dependency warnings or resolution conflicts
          CONFLICTS=$(npm install --dry-run 2>&1 | grep -E "WARN.*peer|conflict|ERESOLVE|unmet peer" || true)
          if [ -n "$CONFLICTS" ]; then
            echo "::warning::Dependency conflicts detected:"
            echo "$CONFLICTS"
            echo "conflicts_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts_found=false" >> "$GITHUB_OUTPUT"
            echo "✅ No dependency conflicts detected."
          fi

      - name: Auto-repair npm dependencies
        if: steps.dep-check.outputs.conflicts_found == 'true' && github.event_name == 'push'
        run: bash scripts/resolve-dependencies.sh

      - name: Detect Python dependency conflicts
        run: |
          if [ -f requirements.txt ]; then
            pip install --dry-run -r requirements.txt 2>&1 | grep -E "conflict|error" || echo "✅ Python deps OK"
          else
            echo "No requirements.txt found — skipping Python check."
          fi

  # ──────────────────────────────────────────────
  # 4. Governance guard
  # ──────────────────────────────────────────────
  governance:
    name: Governance Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check protected artifacts are untouched
        run: |
          PROTECTED_PATTERNS=(
            "prompts/"
            "governance/"
            "specs/"
          )

          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)

          VIOLATIONS=""
          for PATTERN in "${PROTECTED_PATTERNS[@]}"; do
            HITS=$(echo "$CHANGED" | grep "^${PATTERN}" || true)
            if [ -n "$HITS" ]; then
              VIOLATIONS+="  • $HITS\n"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Governance violation — protected files modified:"
            printf "$VIOLATIONS"
            exit 1
          fi
          echo "✅ Governance check passed."
